<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiéreme — una obsesión hermosa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Allura&family=Syne:wght@600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="ether" id="ether"></div>

<nav>
  <div class="logo">Quiéreme</div>
  <ul class="nav-links">
    <li><a href="index.html" class="active">Inicio</a></li>
    <li><a href="collections.html">Colecciones</a></li>
